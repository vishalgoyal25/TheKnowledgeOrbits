repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, css, scss, markdown, json]
        exclude: |
          (?x)^(
            frontend/\.next/|
            frontend/node_modules/|
            backend/staticfiles/|
            backend/media/
          )

  - repo: local
    hooks:
      - id: backend-mypy
        name: Backend Audit (Mypy)
        entry: powershell -Command "cd backend; ..\myvenv\Scripts\mypy engines/ --pretty"
        language: system
        files: ^backend/
        pass_filenames: false

      - id: backend-pytest
        name: Backend Laboratory (Pytest)
        entry: powershell -Command "cd backend; ..\myvenv\Scripts\pytest engines/ -q --tb=short -p no:cacheprovider"
        language: system
        files: ^backend/
        pass_filenames: false

      - id: frontend-jest
        name: Frontend Laboratory (Jest)
        entry: powershell -Command "cd frontend; npm test -- --watchAll=false"
        language: system
        files: ^frontend/
        pass_filenames: false
