# docker-compose.test.yml
# ============================================================
# Test override — installs dev tools for running pytest.
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.test.yml up -d --build
#   docker exec TheKnowledgeOrbits_backend pytest
# ============================================================
services:
  backend:
    build:
      args:
        INSTALL_DEV: "true" # Override: install pytest, black, isort, mypy etc.
        INSTALL_ML: "true"
    image: theknowledgeorbits-backend:test
