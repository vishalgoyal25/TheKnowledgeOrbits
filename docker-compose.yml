services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: TheKnowledgeOrbits_postgres
    env_file:
      - backend/.env
    # Note: postgres image looks for POSTGRES_DB/USER/PASSWORD in env_file automatically
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: TheKnowledgeOrbits_pgadmin
    env_file:
      - backend/.env
    # Note: pgadmin looks for PGADMIN_DEFAULT_EMAIL/PASSWORD in env_file automatically
    ports:
      - "1993:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        INSTALL_DEV: "true"
        INSTALL_ML: "true"
    image: theknowledgeorbits-backend:dev
    container_name: TheKnowledgeOrbits_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - backend/.env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
    networks:
      - app_network

  worker:
    image: theknowledgeorbits-backend:dev
    container_name: TheKnowledgeOrbits_worker
    command: python manage.py process_tasks
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - postgres
    env_file:
      - backend/.env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
    networks:
      - app_network

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: TheKnowledgeOrbits_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
