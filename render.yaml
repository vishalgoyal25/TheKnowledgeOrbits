# ==============================================================================
# render.yaml — Render Infrastructure-as-Code (IaC) manifest
# ==============================================================================
# Docs: https://render.com/docs/blueprint-spec
# Usage: Connect this repo on Render → "New Blueprint" → auto-detects this file
# ==============================================================================

services:
  # ── Django Backend (Web Service) ───────────────────────────────────────────
  - type: web
    name: theknowledgeorbits-backend
    runtime: python
    region: oregon # closest to free-tier Supabase region

    # Build configuration
    buildCommand: "pip install -r backend/requirements/base.txt -r backend/requirements/prod.txt && chmod +x render-build.sh && ./render-build.sh"

    # Start command: runs the Research Agent background worker (django-background-tasks,
    # `process_tasks`) ALONGSIDE gunicorn in the same Starter dyno. process_tasks is
    # backgrounded (&) and executes the LangGraph workflow (run_research) + DeepEval
    # (evaluate_session); gunicorn stays in the foreground and keeps the dyno alive.
    # (Paid Starter dyno = always-on, so the in-process worker never sleeps.)
    # NOTE: the subshell `( … )` is REQUIRED — `cd backend && A & B` parses as
    # `(cd backend && A) &` + `B`, so gunicorn (B) would run from the repo root and
    # fail with `ModuleNotFoundError: No module named 'core'`. Wrapping both in a
    # subshell after `cd backend` makes the `cd` apply to BOTH processes.
    startCommand: "cd backend && (python manage.py process_tasks & gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 8 --worker-class gthread --timeout 120 --keep-alive 10 --max-requests 500 --max-requests-jitter 50)"

    # Pre-deploy: run migrations on DIRECT port (5432) before new version goes live
    # Using 5432 instead of 6543 for migrations is critical for stability.
    preDeployCommand: "cd backend && DB_PORT=5432 python manage.py migrate --noinput"

    healthCheckPath: /api/v1/health/

    # Environment variables — set actual secret values in the Render dashboard
    # (Never commit real secrets to this file!)
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: core.settings.prod
      - key: PYTHONPATH
        value: .
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: PYTHONUNBUFFERED
        value: "1"

      # ── Secrets (set in Render Dashboard → Environment) ────────────────────
      # These are placeholders — override in the Render dashboard UI
      - key: SECRET_KEY
        generateValue: true # Render auto-generates a secure key on first deploy

      - key: DEBUG
        value: "False"

      # Render service URL (set after first deploy / use custom domain)
      # Format: theknowledgeorbits-backend.onrender.com
      - key: ALLOWED_HOSTS
        sync: false # Must be set manually in dashboard

      # CSRF origins: include both Render backend URL and Vercel frontend URL
      # e.g. https://theknowledgeorbits-backend.onrender.com,https://theknowledgeorbits.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        sync: false

      # CORS: Vercel frontend URL(s)
      # e.g. https://theknowledgeorbits.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        sync: false

      # ── Supabase Database ──────────────────────────────────────────────────
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "6543"

      # ── AI & Embeddings ───────────────────────────────────────────────────
      - key: GROQ_API_KEY
        sync: false
      - key: HF_API_TOKEN
        sync: false
      - key: USE_EMBEDDING_API
        value: "True"

      # ── Research Agent (AgenticAI engine) ─────────────────────────────────
      # REDIS_URL is REQUIRED: SSE pub/sub (worker→browser), Redis rate limiter,
      # query cache, user memory. Use a free Upstash rediss:// URL.
      - key: REDIS_URL
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: EXA_API_KEY
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_HOST
        value: https://us.cloud.langfuse.com

      # ── Email (Brevo SMTP) ─────────────────────────────────────────────────
      - key: EMAIL_HOST
        value: smtp-relay.brevo.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false

      # ── Frontend URL ──────────────────────────────────────────────────────
      - key: FRONTEND_URL
        sync: false # e.g. https://theknowledgeorbits.vercel.app

      # ── Monitoring (optional) ─────────────────────────────────────────────
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
