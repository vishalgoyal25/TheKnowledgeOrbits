name: TheKnowledgeOrbits - CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ============================================
  # JOB 1: Backend Integrity (Lint + Security)
  # ============================================
  backend-lint:
    name: Backend Audit (Quality & Security)
    runs-on: ubuntu-latest
    env:
      GROQ_API_KEY: mock-key-for-linting
      DB_PASSWORD: mock-password-for-linting # Required: base.py has no default (security fix)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements/base.txt
            backend/requirements/dev.txt

      - name: Install Dependencies
        run: |
          pip install -r backend/requirements/base.txt
          pip install -r backend/requirements/dev.txt

      - name: Ruff Lint + Format Check
        working-directory: ./backend
        run: |
          pip install ruff==0.4.4
          ruff check .
          ruff format --check .

      - name: Mypy Type Check
        working-directory: ./backend
        run: mypy .

  # ============================================
  # JOB 2: Backend Logic — 3 Parallel Shards
  # Runs concurrently with backend-lint (no needs).
  # Each shard gets its own VM + 2 CPUs.
  # Shard 1: tests 1–~193 | Shard 2: ~194–~386 | Shard 3: ~387–579
  # Combined wall-clock: ~4 min instead of ~11 min.
  # ============================================
  backend-tests:
    name: Backend Tests (Shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false   # Let all shards finish — don't cancel siblings on first failure
      matrix:
        shard: [1, 2, 3]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: test_theknowledgeorbits
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements/base.txt
            backend/requirements/dev.txt

      - name: Install Dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements/base.txt
          pip install -r requirements/dev.txt
          pip install pytest-xdist pytest-timeout

      - name: Create CI Env File
        working-directory: ./backend
        run: |
          cat > .env << 'EOF'
          DJANGO_SETTINGS_MODULE=core.settings.dev
          SECRET_KEY=ci-test-key-not-for-production
          DEBUG=False
          DB_NAME=test_theknowledgeorbits
          DB_USER=postgres
          DB_PASSWORD=postgres
          DB_HOST=localhost
          DB_PORT=5432
          GROQ_API_KEY=mock-key-for-ci
          EMAIL_BACKEND=django.core.mail.backends.console.EmailBackend
          SENTRY_DSN=
          EOF

      - name: Run Migrations
        working-directory: ./backend
        run: python manage.py migrate --noinput

      - name: Execute Tests — Shard ${{ matrix.shard }}/3
        working-directory: ./backend
        run: |
          pytest -n auto \
            --splits 3 --group ${{ matrix.shard }} \
            --cov=engines --cov-report=xml \
            --maxfail=10

      - name: Upload Coverage (Shard ${{ matrix.shard }})
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: shard-${{ matrix.shard }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_ci_if_error: false

  # ============================================
  # JOB 3: Frontend Integrity (TS + Build)
  # ============================================
  frontend-integrity:
    name: Frontend Architect (Build & Types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint Check
        working-directory: ./frontend
        run: npm run lint

      - name: Jest Tests
        working-directory: ./frontend
        run: npm test -- --watchAll=false --passWithNoTests --no-cache

      - name: Production Build Check
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_PUBLIC_SENTRY_DSN: ""
          SENTRY_AUTH_TOKEN: ""
          SKIP_BACKEND_WAIT: "true"

  # ============================================
  # JOB 4: Deploy to Render (The Gatekeeper)
  # needs: backend-tests waits for ALL 3 matrix shards automatically.
  # needs: backend-lint ensures lint also passed before deploying.
  # ONLY triggers on main branch after everything is green.
  # ============================================
  deploy:
    name: Trigger Render Deployment
    needs: [backend-lint, backend-tests, frontend-integrity]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Only deploy from the main branch
    steps:
      - name: Trigger Render Deploy Hook
        # Ensure you have RENDER_DEPLOY_HOOK_URL set in your GitHub Repository Secrets
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
