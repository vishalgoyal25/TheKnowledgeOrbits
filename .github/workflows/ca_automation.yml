name: 🤖 Current Affairs Ghost Worker

on:
  schedule:
    # Runs once every 24 hours at 00:00 UTC (Safest for Free Tier)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Manual trigger for ad-hoc syncing

jobs:
  scrape_and_process:
    name: Execute CA Sync
    runs-on: ubuntu-latest
    timeout-minutes: 45

    concurrency:
      group: ca-scraping
      cancel-in-progress: false

    steps:
      - name: 🛰️ Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements/scraper.txt'

      - name: 📦 Install Scraper Dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do pip install -r backend/requirements/scraper.txt && break || sleep 10; done

      - name: 🚀 Run Automated Scraper
        working-directory: ./backend
        env:
          # Database (Supabase)
          DB_NAME: ${{ secrets.PROD_DB_NAME }}
          DB_USER: ${{ secrets.PROD_DB_USER }}
          DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          DB_HOST: ${{ secrets.PROD_DB_HOST }}
          DB_PORT: ${{ secrets.PROD_DB_PORT }}

          # AI & Security
          GROQ_API_KEY: ${{ secrets.PROD_GROQ_API_KEY }}
          SECRET_KEY: ${{ secrets.PROD_SECRET_KEY }}
          DEBUG: "False"

          # Embeddings: use HuggingFace API instead of loading local model
          # (avoids 400MB model download on every run, saves ~3min per job)
          HF_API_TOKEN: ${{ secrets.PROD_HF_API_TOKEN }}
          USE_EMBEDDING_API: "True"

          # Environment optimization
          PYTHONPATH: .
          PYTHONDONTWRITEBYTECODE: 1
        run: |
          python manage.py scrape_ca

      - name: 🔍 Check Environment on Failure
        if: failure()
        working-directory: ./backend
        run: |
          echo "Listing installed packages..."
          pip list
          echo "Checking PYTHONPATH..."
          echo $PYTHONPATH
          echo "Verifying simplejwt module location..."
          python -c "import rest_framework_simplejwt; print(rest_framework_simplejwt.__file__)" || echo "Module NOT found"
