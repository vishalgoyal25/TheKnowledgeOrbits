name: Keep Alive Ghost Worker

on:
  schedule:
    # Run every 10 minutes to reliably prevent Render free-tier cold starts
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  ping_backend:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Endpoint
        run: |
          curl -sS --fail "https://theknowledgeorbits-backend.onrender.com/api/v1/health/" || echo "Health ping failed but workflow continues"
