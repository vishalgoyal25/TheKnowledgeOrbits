[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | __pycache__
  | migrations
  | venv
  | env
  | \.venv
)/
'''

[tool.mypy]
python_version = "3.11"
plugins = ["mypy_django_plugin.main", "mypy_drf_plugin.main"]
strict = false
ignore_missing_imports = true
exclude = ["migrations", "tests"]
disable_error_code = ["misc"]  # django-stubs nullable field false positives

[tool.django-stubs]
django_settings_module = "core.settings.mypy"

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
ignore = ["E402"]
