<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; border-radius: 10px 10px 0 0; }
        .content { background: #f8f9fa; padding: 30px; border-radius: 0 0 10px 10px; }
        .button { display: inline-block; background: #667eea; color: white; padding: 15px 30px; text-decoration: none; border-radius: 5px; margin: 20px 0; }
        .footer { text-align: center; margin-top: 20px; color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Welcome to {{ site_name }}!</h1>
    </div>
    <div class="content">
        <h2>Hello {{ user.full_name|default:user.email }},</h2>
        <p>Thank you for registering. Please verify your email address.</p>
        
        <p style="text-align: center;">
            <a href="{{ verification_url }}" class="button">Verify Email</a>
        </p>
        
        <p>Or copy this link: <br><span style="word-break: break-all; color: #667eea;">{{ verification_url }}</span></p>
        
        <p><strong>Link expires in 24 hours.</strong></p>
    </div>
    <div class="footer">
        <p>&copy; 2026 TheKnowledgeOrbits</p>
    </div>
</body>
</html>
