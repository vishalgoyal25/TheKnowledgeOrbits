<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 30px; text-align: center; border-radius: 10px 10px 0 0; }
        .content { background: #f8f9fa; padding: 30px; border-radius: 0 0 10px 10px; }
        .button { display: inline-block; background: #f5576c; color: white; padding: 15px 30px; text-decoration: none; border-radius: 5px; margin: 20px 0; }
        .warning { background: #fff3cd; border-left: 4px solid #ffc107; padding: 15px; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Password Reset</h1>
    </div>
    <div class="content">
        <h2>Hello {{ user.full_name|default:user.email }},</h2>
        <p>We received a password reset request.</p>

        <p style="text-align: center;">
            <a href="{{ reset_url }}" class="button">Reset Password</a>
        </p>

        <p>Or copy this link: <br><span style="word-break: break-all; color: #f5576c;">{{ reset_url }}</span></p>

        <div class="warning">
            <strong>⚠️ Security:</strong>
            <ul>
                <li>Link expires in 1 hour</li>
                <li>Ignore if you didn't request this</li>
            </ul>
        </div>
    </div>
</body>
</html>
